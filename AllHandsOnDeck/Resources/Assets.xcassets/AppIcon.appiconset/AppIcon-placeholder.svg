<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="#0a0c11"/>

  <!-- Camera body -->
  <rect x="192" y="340" width="640" height="420" rx="60" fill="#1a1f2e"/>
  <rect x="192" y="340" width="640" height="420" rx="60" fill="none" stroke="#c9a227" stroke-width="8"/>

  <!-- Lens outer ring -->
  <circle cx="512" cy="550" r="170" fill="#111520" stroke="#c9a227" stroke-width="8"/>
  <!-- Lens inner -->
  <circle cx="512" cy="550" r="120" fill="#0d1018"/>
  <!-- Lens highlight -->
  <circle cx="512" cy="550" r="80" fill="#1a2035"/>
  <circle cx="480" cy="520" r="22" fill="#ffffff" opacity="0.08"/>

  <!-- Viewfinder bump -->
  <rect x="380" y="280" width="264" height="80" rx="30" fill="#1a1f2e" stroke="#c9a227" stroke-width="8"/>

  <!-- Shutter button -->
  <circle cx="820" cy="420" r="36" fill="#c9a227" opacity="0.9"/>
  <circle cx="820" cy="420" r="24" fill="#0a0c11"/>

  <!-- People silhouettes (3 simplified figures) -->
  <!-- Left person -->
  <circle cx="330" cy="530" r="38" fill="#c9a227" opacity="0.55"/>
  <rect x="296" y="570" width="68" height="80" rx="20" fill="#c9a227" opacity="0.4"/>
  <!-- Center person (taller, in frame) -->
  <circle cx="512" cy="510" r="46" fill="#c9a227" opacity="0.8"/>
  <rect x="468" y="556" width="88" height="100" rx="24" fill="#c9a227" opacity="0.65"/>
  <!-- Right person -->
  <circle cx="694" cy="530" r="38" fill="#c9a227" opacity="0.55"/>
  <rect x="660" y="570" width="68" height="80" rx="20" fill="#c9a227" opacity="0.4"/>

  <!-- Signal arcs (broadcast / live) -->
  <path d="M 512 200 A 120 120 0 0 1 632 260" fill="none" stroke="#c9a227" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <path d="M 512 200 A 160 160 0 0 1 672 280" fill="none" stroke="#c9a227" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
  <path d="M 512 200 A 80 80 0 0 1 592 240" fill="none" stroke="#c9a227" stroke-width="14" stroke-linecap="round" opacity="0.9"/>

  <!-- App name label -->
  <text x="512" y="810" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700"
        fill="#c9a227" text-anchor="middle" letter-spacing="1">ALL HANDS</text>
  <text x="512" y="860" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="400"
        fill="#c9a227" text-anchor="middle" opacity="0.7" letter-spacing="3">ON DECK</text>
</svg>
