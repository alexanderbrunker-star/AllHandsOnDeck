name: Vercel Webapp Deploy

on:
  push:
    branches: [main]
    paths:
      - 'webapp/**'
      - 'vercel.json'
      - '.github/workflows/vercel-webapp.yml'
  pull_request:
    paths:
      - 'webapp/**'
      - 'vercel.json'
      - '.github/workflows/vercel-webapp.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy-preview:
    name: Preview deploy
    if: github.event_name == 'pull_request' && vars.ENABLE_VERCEL_DEPLOY == 'true'
    runs-on: ubuntu-latest
    environment: preview
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_ENABLE_LIVEKIT_BETA: ${{ vars.VITE_ENABLE_LIVEKIT_BETA }}
      VITE_LIVEKIT_TOKEN_ENDPOINT: ${{ vars.VITE_LIVEKIT_TOKEN_ENDPOINT }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Install webapp dependencies
        working-directory: webapp
        run: npm ci

      - name: Type-check webapp
        working-directory: webapp
        run: npm run typecheck

      - name: Test webapp
        working-directory: webapp
        run: npm test

      - name: Pull Vercel preview environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build preview
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}

  deploy-production:
    name: Production deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_VERCEL_DEPLOY == 'true'
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_ENABLE_LIVEKIT_BETA: ${{ vars.VITE_ENABLE_LIVEKIT_BETA }}
      VITE_LIVEKIT_TOKEN_ENDPOINT: ${{ vars.VITE_LIVEKIT_TOKEN_ENDPOINT }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Install webapp dependencies
        working-directory: webapp
        run: npm ci

      - name: Type-check webapp
        working-directory: webapp
        run: npm run typecheck

      - name: Test webapp
        working-directory: webapp
        run: npm test

      - name: Pull Vercel production environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build production
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
