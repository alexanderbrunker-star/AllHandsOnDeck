apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: allhands-server
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"   # scale-to-zero on idle → free
        autoscaling.knative.dev/maxScale: "3"
        run.googleapis.com/execution-environment: gen2
    spec:
      timeoutSeconds: 3600    # keep WebSocket connections alive up to 1h
      containerConcurrency: 80
      containers:
        - image: IMAGE_PLACEHOLDER   # filled in by deploy.sh
          ports:
            - containerPort: 8787
          env:
            - name: PORT
              value: "8787"
            - name: NODE_ENV
              value: production
          resources:
            limits:
              cpu: "1"
              memory: 256Mi
